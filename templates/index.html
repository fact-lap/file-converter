<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>檔案轉換器</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="container">
  <h1>檔案轉換器</h1>

  <div class="tabs">
    <button class="tab active" data-tab="convert">格式轉換</button>
    <button class="tab" data-tab="compress">圖片壓縮</button>
    <button class="tab" data-tab="audio-compress">音頻壓縮</button>
    <button class="tab" data-tab="stem">Stem Split</button>
    <button class="tab" data-tab="crop">圖片裁切</button>
  </div>

  <!-- ===== 格式轉換 ===== -->
  <div class="panel active" id="panel-convert">
    <div class="drop-zone" id="dz-convert">
      <div class="drop-icon">📁</div>
      <p>拖曳或 <label class="btn-upload" for="fi-convert">選擇檔案</label></p>
      <input type="file" id="fi-convert" hidden>
      <p class="file-hint" id="hint-convert">尚未選擇</p>
    </div>
    <div class="format-section" id="fs-convert" style="display:none">
      <label>輸出格式</label>
      <div class="format-grid" id="fg-convert"></div>
    </div>
    <div class="transcription-options" id="tx-options" style="display:none">
      <label class="ctrl-label">採譜模式</label>
      <div class="mode-row">
        <button class="mode-btn tx-mode active" data-mode="direct">直接採譜</button>
        <button class="mode-btn tx-mode" data-mode="demucs">先拆 stem</button>
      </div>
      <div class="format-grid tx-stems" id="tx-stems" style="display:none">
        <button class="format-btn active" data-stem="vocals">vocals</button>
        <button class="format-btn" data-stem="instrumental">instrumental</button>
      </div>
      <label class="check-row">
        <input type="checkbox" id="melody-mode" checked>
        <span>單聲部 melody cleanup</span>
      </label>
      <label class="ctrl-label small-label" for="quantize-select">量化</label>
      <select class="select-control" id="quantize-select">
        <option value="none">不量化</option>
        <option value="eighth">1/8</option>
        <option value="sixteenth" selected>1/16</option>
      </select>
      <p class="compress-note">Audio → MIDI / MusicXML / PDF 屬 AI 草稿採譜，適合先出初稿再人手執譜。</p>
    </div>
    <button class="btn-action" id="btn-convert" disabled>轉換</button>
    <div class="status" id="st-convert"></div>
  </div>

  <!-- ===== 圖片壓縮 ===== -->
  <div class="panel" id="panel-compress">
    <div class="drop-zone" id="dz-compress">
      <div class="drop-icon">🗜</div>
      <p>拖曳或 <label class="btn-upload" for="fi-compress">選擇圖片</label></p>
      <input type="file" id="fi-compress" accept="image/*" hidden>
      <p class="file-hint" id="hint-compress">尚未選擇</p>
    </div>
    <!-- 預覽圖 -->
    <div id="compress-preview-wrap" style="display:none;margin-bottom:14px;text-align:center">
      <img id="compress-preview" style="max-width:100%;max-height:260px;border-radius:6px;border:1px solid #eee">
    </div>
    <div class="compress-controls" id="cc-compress" style="display:none">
      <label>壓縮到原始大小的 <span id="pct-label">50</span>%</label>
      <input type="range" id="pct-slider" min="5" max="90" value="50" step="5">
      <div class="size-row">
        <span>原始：<b id="orig-size">—</b></span>
        <span>預計：<b id="est-size">—</b></span>
      </div>
    </div>
    <button class="btn-action" id="btn-compress" disabled>壓縮</button>
    <div class="status" id="st-compress"></div>
    <div class="size-result" id="size-result" style="display:none">
      原始 <b id="res-orig"></b> → 壓縮後 <b id="res-comp"></b>（節省 <b id="res-saved"></b>）
    </div>
  </div>

  <!-- ===== 音頻壓縮 ===== -->
  <div class="panel" id="panel-audio-compress">
    <div class="drop-zone" id="dz-acompress">
      <div class="drop-icon">🎵</div>
      <p>拖曳或 <label class="btn-upload" for="fi-acompress">選擇音頻</label></p>
      <input type="file" id="fi-acompress" accept="audio/*" hidden>
      <p class="file-hint" id="hint-acompress">尚未選擇</p>
    </div>
    <div class="compress-controls" id="cc-acompress" style="display:none">
      <label>壓縮到原始大小的 <span id="apct-label">50</span>%</label>
      <input type="range" id="apct-slider" min="10" max="90" value="50" step="5">
      <div class="size-row">
        <span>原始：<b id="aorig-size">—</b></span>
        <span>預計：<b id="aest-size">—</b></span>
      </div>
      <p class="compress-note">WAV / FLAC 等無損格式將自動轉為 MP3 輸出</p>
    </div>
    <button class="btn-action" id="btn-acompress" disabled>壓縮</button>
    <div class="status" id="st-acompress"></div>
    <div class="size-result" id="asize-result" style="display:none">
      原始 <b id="ares-orig"></b> → 壓縮後 <b id="ares-comp"></b>（節省 <b id="ares-saved"></b>）
    </div>
  </div>

  <!-- ===== Stem Split ===== -->
  <div class="panel" id="panel-stem">
    <div class="drop-zone" id="dz-stem">
      <div class="drop-icon">🎚</div>
      <p>拖曳或 <label class="btn-upload" for="fi-stem">選擇音頻</label></p>
      <input type="file" id="fi-stem" accept="audio/*" hidden>
      <p class="file-hint" id="hint-stem">尚未選擇</p>
    </div>
    <div class="format-section" id="fs-stem" style="display:none">
      <label>拆軌模式</label>
      <div class="format-grid" id="fg-stem">
        <button class="format-btn active" data-mode="vocals_instrumental">vocals + instrumental</button>
        <button class="format-btn" data-mode="four_stems">vocals + drums + bass + other</button>
      </div>
      <p class="compress-note">輸出為 zip，內含分開的 WAV stem audio files。</p>
    </div>
    <button class="btn-action" id="btn-stem" disabled>拆軌並下載</button>
    <div class="status" id="st-stem"></div>
  </div>

  <!-- ===== 圖片裁切 ===== -->
  <div class="panel" id="panel-crop">
    <div class="drop-zone" id="dz-crop">
      <div class="drop-icon">✂️</div>
      <p>拖曳或 <label class="btn-upload" for="fi-crop">選擇圖片</label></p>
      <input type="file" id="fi-crop" accept="image/*" hidden>
      <p class="file-hint" id="hint-crop">尚未選擇</p>
    </div>

    <div id="crop-workspace" style="display:none">
      <!-- 模式 + 比例 + 縮放 -->
      <div class="crop-toolbar">
        <div class="toolbar-row">
          <div class="mode-row">
            <button class="mode-btn active" data-mode="ratio">比例</button>
            <button class="mode-btn" data-mode="free">自由</button>
          </div>
          <div class="zoom-row">
            <button class="zoom-btn" id="zoom-out">－</button>
            <span id="zoom-label">1×</span>
            <button class="zoom-btn" id="zoom-in">＋</button>
          </div>
        </div>
        <div id="ratio-btns" class="ratio-grid">
          <button class="ratio-btn active" data-w="1" data-h="1">1:1</button>
          <button class="ratio-btn" data-w="4" data-h="3">4:3</button>
          <button class="ratio-btn" data-w="16" data-h="9">16:9</button>
          <button class="ratio-btn" data-w="9" data-h="16">9:16</button>
          <button class="ratio-btn" data-w="3" data-h="4">3:4</button>
          <button class="ratio-btn" data-w="2" data-h="3">2:3</button>
        </div>
      </div>

      <!-- 可滾動的預覽容器 -->
      <div class="crop-scroll-wrap" id="crop-scroll-wrap">
        <div class="crop-img-wrap" id="crop-img-wrap">
          <img id="crop-img" draggable="false" alt="">
          <div class="crop-overlay" id="crop-overlay">
            <div class="crop-shade" id="shade-top"></div>
            <div class="crop-shade" id="shade-left"></div>
            <div class="crop-shade" id="shade-right"></div>
            <div class="crop-shade" id="shade-bottom"></div>
            <div class="crop-sel" id="crop-sel">
              <div class="crop-sel-info" id="crop-sel-info">—</div>
              <div class="handle tl"></div>
              <div class="handle tr"></div>
              <div class="handle bl"></div>
              <div class="handle br"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="crop-coords" id="crop-coords">在圖片上拖拉選取裁切範圍</div>

      <div style="margin-top:12px">
        <label class="ctrl-label">輸出格式</label>
        <div class="format-grid" id="fg-crop">
          <button class="format-btn active" data-fmt="jpg">jpg</button>
          <button class="format-btn" data-fmt="png">png</button>
          <button class="format-btn" data-fmt="webp">webp</button>
        </div>
      </div>
      <div style="margin-top:10px">
        <label class="btn-upload-sm" for="fi-crop-change">換圖</label>
        <input type="file" id="fi-crop-change" accept="image/*" hidden>
      </div>
    </div>

    <button class="btn-action" id="btn-crop" disabled style="margin-top:14px">裁切並下載</button>
    <div class="status" id="st-crop"></div>
  </div>

  <details class="supported-list">
    <summary>支援的格式</summary>
    <div id="supportedList"></div>
  </details>
</div>

<script>
let formatsData = {};

// ── Tab ───────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

// ── 工具 ─────────────────────────────────────────
function fmtBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}
function setStatus(id, msg, type='') {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = 'status ' + type;
}
function setupDropZone(dzId, inputId, onFile) {
  const dz = document.getElementById(dzId);
  const fi = document.getElementById(inputId);
  fi.addEventListener('change', e => { if (e.target.files[0]) onFile(e.target.files[0]); });
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    if (e.dataTransfer.files[0]) onFile(e.dataTransfer.files[0]);
  });
}
function triggerDownload(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

// ── 格式轉換 ──────────────────────────────────────
let convertFile = null, convertFmt = null, transcriptionMode = 'direct', transcriptionStem = 'vocals';
const audioExts = new Set(['mp3','wav','flac','aac','ogg','m4a','opus','wma']);
const transcriptionTargets = new Set(['mid','midi','musicxml','pdf']);

function updateTranscriptionOptions() {
  const ext = convertFile ? convertFile.name.split('.').pop().toLowerCase() : '';
  const show = audioExts.has(ext) && transcriptionTargets.has(convertFmt || '');
  document.getElementById('tx-options').style.display = show ? 'block' : 'none';
}

document.querySelectorAll('.tx-mode').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tx-mode').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    transcriptionMode = btn.dataset.mode;
    document.getElementById('tx-stems').style.display = transcriptionMode === 'demucs' ? 'flex' : 'none';
  });
});
document.querySelectorAll('#tx-stems .format-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#tx-stems .format-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    transcriptionStem = btn.dataset.stem;
  });
});

setupDropZone('dz-convert', 'fi-convert', file => {
  convertFile = file; convertFmt = null;
  document.getElementById('hint-convert').textContent = file.name;
  document.getElementById('btn-convert').disabled = true;
  document.getElementById('tx-options').style.display = 'none';
  setStatus('st-convert', '');
  const ext = file.name.split('.').pop().toLowerCase();
  const targets = formatsData[ext] || [];
  const fs = document.getElementById('fs-convert');
  const fg = document.getElementById('fg-convert');
  if (!targets.length) { fs.style.display='none'; setStatus('st-convert','不支援：'+ext,'error'); return; }
  fs.style.display = 'block';
  fg.innerHTML = targets.map(t=>`<button class="format-btn" data-fmt="${t}">.${t}</button>`).join('');
  fg.querySelectorAll('.format-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      fg.querySelectorAll('.format-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active'); convertFmt = btn.dataset.fmt;
      updateTranscriptionOptions();
      document.getElementById('btn-convert').disabled = false;
    });
  });
});
document.getElementById('btn-convert').addEventListener('click', async () => {
  if (!convertFile || !convertFmt) return;
  const btn = document.getElementById('btn-convert');
  btn.disabled=true; btn.textContent='轉換中...'; setStatus('st-convert','處理中...','info');
  const fd = new FormData(); fd.append('file',convertFile); fd.append('output_format',convertFmt);
  fd.append('transcription_mode', transcriptionMode);
  fd.append('stem', transcriptionStem);
  fd.append('melody_mode', document.getElementById('melody-mode').checked ? 'true' : 'false');
  fd.append('quantize', document.getElementById('quantize-select').value);
  try {
    const res = await fetch('/convert',{method:'POST',body:fd});
    if (!res.ok) { const e=await res.json(); setStatus('st-convert','錯誤：'+e.error,'error'); return; }
    triggerDownload(await res.blob(), convertFile.name.replace(/\.[^.]+$/,'')+'.'+convertFmt);
    setStatus('st-convert','完成！','success');
  } catch(e) { setStatus('st-convert','連線錯誤','error'); }
  finally { btn.disabled=false; btn.textContent='轉換'; }
});

// ── Stem Split ───────────────────────────────────
let stemFile = null, stemMode = 'vocals_instrumental';
setupDropZone('dz-stem', 'fi-stem', file => {
  stemFile = file;
  document.getElementById('hint-stem').textContent = `${file.name} (${fmtBytes(file.size)})`;
  document.getElementById('fs-stem').style.display = 'block';
  document.getElementById('btn-stem').disabled = false;
  setStatus('st-stem', '');
});
document.querySelectorAll('#fg-stem .format-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#fg-stem .format-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    stemMode = btn.dataset.mode;
  });
});
document.getElementById('btn-stem').addEventListener('click', async () => {
  if (!stemFile) return;
  const btn = document.getElementById('btn-stem');
  btn.disabled=true; btn.textContent='拆軌中...'; setStatus('st-stem','處理中，長音檔可能需要幾分鐘...','info');
  const fd = new FormData(); fd.append('file', stemFile); fd.append('stem_mode', stemMode);
  try {
    const res = await fetch('/stem-split',{method:'POST',body:fd});
    if (!res.ok) { const e=await res.json(); setStatus('st-stem','錯誤：'+e.error,'error'); return; }
    triggerDownload(await res.blob(), stemFile.name.replace(/\.[^.]+$/,'')+'_stems.zip');
    setStatus('st-stem','完成！','success');
  } catch(e) { setStatus('st-stem','連線錯誤','error'); }
  finally { btn.disabled=false; btn.textContent='拆軌並下載'; }
});

// ── 圖片壓縮 ──────────────────────────────────────
let compressFile = null;
setupDropZone('dz-compress', 'fi-compress', file => {
  compressFile = file;
  document.getElementById('hint-compress').textContent = `${file.name} (${fmtBytes(file.size)})`;
  document.getElementById('btn-compress').disabled = false;
  document.getElementById('cc-compress').style.display = 'block';
  document.getElementById('size-result').style.display = 'none';
  setStatus('st-compress','');
  document.getElementById('orig-size').textContent = fmtBytes(file.size);
  updateEstSize();
  // 顯示預覽圖
  const prevWrap = document.getElementById('compress-preview-wrap');
  const prevImg  = document.getElementById('compress-preview');
  const oldUrl = prevImg.src;
  if (oldUrl && oldUrl.startsWith('blob:')) URL.revokeObjectURL(oldUrl);
  prevImg.src = URL.createObjectURL(file);
  prevWrap.style.display = 'block';
});
function updateEstSize() {
  if (!compressFile) return;
  const pct = parseInt(document.getElementById('pct-slider').value);
  document.getElementById('pct-label').textContent = pct;
  document.getElementById('est-size').textContent = fmtBytes(Math.round(compressFile.size*pct/100));
}
document.getElementById('pct-slider').addEventListener('input', updateEstSize);
document.getElementById('btn-compress').addEventListener('click', async () => {
  if (!compressFile) return;
  const btn = document.getElementById('btn-compress');
  btn.disabled=true; btn.textContent='壓縮中...'; setStatus('st-compress','處理中...','info');
  const fd = new FormData(); fd.append('file',compressFile); fd.append('target_pct',document.getElementById('pct-slider').value);
  try {
    const res = await fetch('/compress',{method:'POST',body:fd});
    if (!res.ok) { const e=await res.json(); setStatus('st-compress','錯誤：'+e.error,'error'); return; }
    const origSize = parseInt(res.headers.get('X-Original-Size')||compressFile.size);
    const compSize = parseInt(res.headers.get('X-Compressed-Size')||0);
    const ext = compressFile.name.split('.').pop().toLowerCase();
    const outExt = ['jpg','jpeg','webp'].includes(ext)?ext:'jpg';
    triggerDownload(await res.blob(), compressFile.name.replace(/\.[^.]+$/,'')+'_compressed.'+outExt);
    document.getElementById('res-orig').textContent = fmtBytes(origSize);
    document.getElementById('res-comp').textContent = fmtBytes(compSize);
    document.getElementById('res-saved').textContent = Math.round((1-compSize/origSize)*100)+'%';
    document.getElementById('size-result').style.display = 'block';
    setStatus('st-compress','完成！','success');
  } catch(e) { setStatus('st-compress','連線錯誤','error'); }
  finally { btn.disabled=false; btn.textContent='壓縮'; }
});

// ── 音頻壓縮 ──────────────────────────────────────
let acompressFile = null;
setupDropZone('dz-acompress', 'fi-acompress', file => {
  acompressFile = file;
  document.getElementById('hint-acompress').textContent = `${file.name} (${fmtBytes(file.size)})`;
  document.getElementById('btn-acompress').disabled = false;
  document.getElementById('cc-acompress').style.display = 'block';
  document.getElementById('asize-result').style.display = 'none';
  setStatus('st-acompress','');
  document.getElementById('aorig-size').textContent = fmtBytes(file.size);
  updateAEstSize();
});
function updateAEstSize() {
  if (!acompressFile) return;
  const pct = parseInt(document.getElementById('apct-slider').value);
  document.getElementById('apct-label').textContent = pct;
  document.getElementById('aest-size').textContent = fmtBytes(Math.round(acompressFile.size*pct/100));
}
document.getElementById('apct-slider').addEventListener('input', updateAEstSize);
document.getElementById('btn-acompress').addEventListener('click', async () => {
  if (!acompressFile) return;
  const btn = document.getElementById('btn-acompress');
  btn.disabled=true; btn.textContent='壓縮中...'; setStatus('st-acompress','處理中...','info');
  const fd = new FormData(); fd.append('file',acompressFile); fd.append('target_pct',document.getElementById('apct-slider').value);
  try {
    const res = await fetch('/compress-audio',{method:'POST',body:fd});
    if (!res.ok) { const e=await res.json(); setStatus('st-acompress','錯誤：'+e.error,'error'); return; }
    const origSize = parseInt(res.headers.get('X-Original-Size')||acompressFile.size);
    const compSize = parseInt(res.headers.get('X-Compressed-Size')||0);
    const ext = acompressFile.name.split('.').pop().toLowerCase();
    const outExt = ['mp3','aac','ogg','m4a','opus'].includes(ext)?ext:'mp3';
    triggerDownload(await res.blob(), acompressFile.name.replace(/\.[^.]+$/,'')+'_compressed.'+outExt);
    document.getElementById('ares-orig').textContent = fmtBytes(origSize);
    document.getElementById('ares-comp').textContent = fmtBytes(compSize);
    document.getElementById('ares-saved').textContent = Math.round((1-compSize/origSize)*100)+'%';
    document.getElementById('asize-result').style.display = 'block';
    setStatus('st-acompress','完成！','success');
  } catch(e) { setStatus('st-acompress','連線錯誤','error'); }
  finally { btn.disabled=false; btn.textContent='壓縮'; }
});

// ── 圖片裁切（互動預覽 + 縮放）──────────────────────
let cropFile = null, cropFmt = 'jpg';
let cropMode = 'ratio', cropRW = 1, cropRH = 1;
let sel = {x:0, y:0, w:0, h:0, valid:false};
let dragging = false, dragStart = {x:0, y:0};
let dragMode = 'draw';
let moveOffset = {x:0, y:0};

// 縮放
const ZOOM_STEPS = [1, 1.5, 2, 3];
let zoomIdx = 0;

const cropImg    = document.getElementById('crop-img');
const cropOverlay= document.getElementById('crop-overlay');
const cropSelEl  = document.getElementById('crop-sel');
const cropInfo   = document.getElementById('crop-sel-info');
const cropCoords = document.getElementById('crop-coords');
const shadeTop   = document.getElementById('shade-top');
const shadeLeft  = document.getElementById('shade-left');
const shadeRight = document.getElementById('shade-right');
const shadeBottom= document.getElementById('shade-bottom');

function applyZoom(newIdx) {
  const oldW = cropImg.offsetWidth;
  const oldH = cropImg.offsetHeight;
  zoomIdx = Math.max(0, Math.min(newIdx, ZOOM_STEPS.length - 1));
  const z = ZOOM_STEPS[zoomIdx];
  cropImg.style.maxHeight = (420 * z) + 'px';
  cropImg.style.maxWidth  = '100%';
  document.getElementById('zoom-label').textContent = z + '×';
  document.getElementById('zoom-out').disabled = zoomIdx === 0;
  document.getElementById('zoom-in').disabled  = zoomIdx === ZOOM_STEPS.length - 1;
  requestAnimationFrame(() => {
    if (sel.valid && oldW > 0) {
      const sx = cropImg.offsetWidth  / oldW;
      const sy = cropImg.offsetHeight / oldH;
      sel.x *= sx; sel.y *= sy; sel.w *= sx; sel.h *= sy;
    }
    renderSel(); updateShades();
  });
}

document.getElementById('zoom-in').addEventListener('click',  () => applyZoom(zoomIdx + 1));
document.getElementById('zoom-out').addEventListener('click', () => applyZoom(zoomIdx - 1));

function isInSel(p) {
  return sel.valid && p.x >= sel.x && p.x <= sel.x+sel.w && p.y >= sel.y && p.y <= sel.y+sel.h;
}

function loadCropFile(file) {
  cropFile = file;
  sel = {x:0, y:0, w:0, h:0, valid:false};
  zoomIdx = 0;
  document.getElementById('dz-crop').style.display = 'none';
  document.getElementById('crop-workspace').style.display = 'block';
  document.getElementById('btn-crop').disabled = true;
  setStatus('st-crop','');
  cropCoords.textContent = '在圖片上拖拉選取裁切範圍';
  cropImg.style.maxHeight = '420px';
  cropImg.style.maxWidth  = '100%';
  document.getElementById('zoom-label').textContent = '1×';
  document.getElementById('zoom-in').disabled  = false;
  document.getElementById('zoom-out').disabled = true;
  const url = URL.createObjectURL(file);
  cropImg.onload = () => { URL.revokeObjectURL(url); updateShades(); };
  cropImg.src = url;
}

setupDropZone('dz-crop', 'fi-crop', loadCropFile);
document.getElementById('fi-crop-change').addEventListener('change', e => {
  if (e.target.files[0]) loadCropFile(e.target.files[0]);
});

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    cropMode = btn.dataset.mode;
    document.getElementById('ratio-btns').style.display = cropMode==='ratio' ? 'flex' : 'none';
    sel.valid = false; updateShades();
    cropCoords.textContent = '在圖片上拖拉選取裁切範圍';
    document.getElementById('btn-crop').disabled = true;
  });
});

document.querySelectorAll('.ratio-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ratio-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    cropRW = parseInt(btn.dataset.w); cropRH = parseInt(btn.dataset.h);
    if (cropImg.naturalWidth) applyCenterRatio();
  });
});

function applyCenterRatio() {
  const dw = cropImg.offsetWidth, dh = cropImg.offsetHeight;
  const ratio = cropRW / cropRH;
  let sw, sh;
  if (dw / dh > ratio) { sh = dh * 0.9; sw = sh * ratio; }
  else { sw = dw * 0.9; sh = sw / ratio; }
  sel = { x: (dw-sw)/2, y: (dh-sh)/2, w: sw, h: sh, valid: true };
  renderSel(); updateCoords();
  document.getElementById('btn-crop').disabled = false;
}

function toReal(v, axis) {
  const scale = axis==='x'
    ? cropImg.naturalWidth  / cropImg.offsetWidth
    : cropImg.naturalHeight / cropImg.offsetHeight;
  return Math.round(v * scale);
}

function getPointerPos(e) {
  const rect = cropOverlay.getBoundingClientRect();
  const client = e.touches ? e.touches[0] : e;
  return {
    x: Math.max(0, Math.min(client.clientX - rect.left, rect.width)),
    y: Math.max(0, Math.min(client.clientY - rect.top,  rect.height)),
  };
}

function startDrag(e) {
  e.preventDefault();
  const p = getPointerPos(e);
  dragging = true;
  if (isInSel(p)) {
    dragMode = 'move';
    moveOffset = {x: p.x - sel.x, y: p.y - sel.y};
  } else {
    dragMode = 'draw';
    dragStart = p;
    sel = {x:p.x, y:p.y, w:0, h:0, valid:false};
  }
}

function moveDrag(e) {
  if (!dragging) {
    const p = getPointerPos(e);
    cropOverlay.style.cursor = isInSel(p) ? 'move' : 'crosshair';
    return;
  }
  e.preventDefault();
  const p = getPointerPos(e);
  const dw = cropImg.offsetWidth, dh = cropImg.offsetHeight;

  if (dragMode === 'move') {
    sel.x = Math.max(0, Math.min(p.x - moveOffset.x, dw - sel.w));
    sel.y = Math.max(0, Math.min(p.y - moveOffset.y, dh - sel.h));
    renderSel(); updateCoords(); return;
  }

  let dx = p.x - dragStart.x;
  let dy = p.y - dragStart.y;
  if (cropMode === 'ratio') {
    const ratio = cropRW / cropRH;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (absDx / ratio > absDy) { dy = (absDx/ratio) * Math.sign(dy || 1); }
    else { dx = absDy * ratio * Math.sign(dx || 1); }
  }
  sel.x = dx >= 0 ? dragStart.x : Math.max(0, dragStart.x + dx);
  sel.y = dy >= 0 ? dragStart.y : Math.max(0, dragStart.y + dy);
  sel.w = Math.min(Math.abs(dx), dw - sel.x);
  sel.h = Math.min(Math.abs(dy), dh - sel.y);
  if (sel.w > 2 && sel.h > 2) { sel.valid = true; renderSel(); updateCoords(); }
}

function endDrag() {
  if (!dragging) return;
  dragging = false;
  if (sel.valid && sel.w > 5 && sel.h > 5)
    document.getElementById('btn-crop').disabled = false;
}

cropOverlay.addEventListener('mousedown',  startDrag);
cropOverlay.addEventListener('mousemove',  moveDrag);
cropOverlay.addEventListener('mouseup',    endDrag);
cropOverlay.addEventListener('mouseleave', endDrag);
cropOverlay.addEventListener('touchstart', startDrag, {passive:false});
cropOverlay.addEventListener('touchmove',  moveDrag,  {passive:false});
cropOverlay.addEventListener('touchend',   endDrag);

function renderSel() {
  if (!sel.valid) { cropSelEl.style.display='none'; return; }
  cropSelEl.style.display = 'block';
  cropSelEl.style.left   = sel.x + 'px';
  cropSelEl.style.top    = sel.y + 'px';
  cropSelEl.style.width  = sel.w + 'px';
  cropSelEl.style.height = sel.h + 'px';
  cropInfo.textContent = `${toReal(sel.w,'x')} × ${toReal(sel.h,'y')}`;
  updateShades();
}

function updateShades() {
  const dw = cropImg.offsetWidth || 0, dh = cropImg.offsetHeight || 0;
  if (!sel.valid || !dw) {
    [shadeTop,shadeLeft,shadeRight,shadeBottom].forEach(s => s.style.display='none');
    cropSelEl.style.display = 'none'; return;
  }
  const {x,y,w,h} = sel;
  shadeTop.style.cssText    = `display:block;top:0;left:0;width:${dw}px;height:${y}px`;
  shadeBottom.style.cssText = `display:block;top:${y+h}px;left:0;width:${dw}px;height:${dh-y-h}px`;
  shadeLeft.style.cssText   = `display:block;top:${y}px;left:0;width:${x}px;height:${h}px`;
  shadeRight.style.cssText  = `display:block;top:${y}px;left:${x+w}px;width:${dw-x-w}px;height:${h}px`;
}

function updateCoords() {
  if (!sel.valid) return;
  cropCoords.textContent = `X: ${toReal(sel.x,'x')}  Y: ${toReal(sel.y,'y')}  |  ${toReal(sel.w,'x')} × ${toReal(sel.h,'y')} px`;
}

document.querySelectorAll('#fg-crop .format-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#fg-crop .format-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); cropFmt = btn.dataset.fmt;
  });
});

document.getElementById('btn-crop').addEventListener('click', async () => {
  if (!cropFile || !sel.valid) return;
  const btn = document.getElementById('btn-crop');
  btn.disabled=true; btn.textContent='裁切中...'; setStatus('st-crop','處理中...','info');
  const fd = new FormData();
  fd.append('file', cropFile); fd.append('output_format', cropFmt); fd.append('mode','custom');
  fd.append('x', toReal(sel.x,'x')); fd.append('y', toReal(sel.y,'y'));
  fd.append('width', toReal(sel.w,'x')); fd.append('height', toReal(sel.h,'y'));
  try {
    const res = await fetch('/crop',{method:'POST',body:fd});
    if (!res.ok) { const e=await res.json(); setStatus('st-crop','錯誤：'+e.error,'error'); return; }
    triggerDownload(await res.blob(), cropFile.name.replace(/\.[^.]+$/,'')+'_cropped.'+cropFmt);
    setStatus('st-crop','完成！','success');
  } catch(e) { setStatus('st-crop','連線錯誤','error'); }
  finally { btn.disabled=false; btn.textContent='裁切並下載'; }
});

cropImg.addEventListener('load', () => {
  if (cropMode === 'ratio') applyCenterRatio();
});

// ── 支援格式 ─────────────────────────────────────
async function loadFormats() {
  const res = await fetch('/formats');
  const data = await res.json();
  formatsData = data.supported;
  let html = '<table><tr><th>輸入</th><th>可轉換為</th></tr>';
  for (const [ext, targets] of Object.entries(formatsData))
    html += `<tr><td><code>.${ext}</code></td><td>${targets.map(t=>`<code>.${t}</code>`).join(' ')}</td></tr>`;
  document.getElementById('supportedList').innerHTML = html + '</table>';
}
loadFormats();
</script>
</body>
